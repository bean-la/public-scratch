<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slyce for dublab — Platform Approach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181b24;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #5b8def;
      --border: #2a3040;
      --code-bg: #1e2330;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 17px;
    }
    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    main {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }
    #content h1 { font-size: 2rem; margin-top: 0; letter-spacing: -0.03em; }
    #content h2 {
      font-size: 1.45rem;
      margin-top: 2.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.02em;
    }
    #content h3 { font-size: 1.15rem; margin-top: 1.75rem; color: var(--text); }
    #content p, #content li { color: #c8ced9; }
    #content strong { color: var(--text); font-weight: 600; }
    #content a { color: var(--accent); }
    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    #content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      margin: 1.25rem 0;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 0.55rem 0.75rem;
      text-align: left;
    }
    #content th { background: var(--surface); font-weight: 600; }
    #content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    #content code {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }
    #content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
    }
    #content pre code { background: none; padding: 0; }
    .mermaid {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }
    .loading { color: var(--muted); }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>Slyce for dublab</h1>
    <p>Platform approach &amp; architecture overview · May 2026</p>
  </header>
  <main>
    <article id="content"><p class="loading">Loading document…</p></article>
  </main>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    import { marked } from "https://cdn.jsdelivr.net/npm/marked@15/lib/marked.esm.js";

    mermaid.initialize({
      startOnLoad: false,
      theme: "dark",
      securityLevel: "loose",
      flowchart: { curve: "basis" },
    });

    const renderer = {
      code(token) {
        const lang = token.lang || "";
        const text = token.text;
        if (lang === "mermaid") {
          return `<pre class="mermaid">${text}</pre>`;
        }
        const escaped = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        return `<pre><code class="language-${lang}">${escaped}</code></pre>`;
      },
    };
    marked.use({ renderer });

    async function render() {
      const el = document.getElementById("content");
      try {
        const res = await fetch("dublab-approach-outline.md");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        el.innerHTML = marked.parse(md);
        await mermaid.run({ querySelector: ".mermaid" });
      } catch (err) {
        el.innerHTML = `<p class="error">Failed to load document: ${err.message}</p>`;
      }
    }
    render();
  </script>
</body>
</html>
